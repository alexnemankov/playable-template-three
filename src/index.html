<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Word Association Tiles - 3D Playable Ad</title>
</head>
<body>
    <div id="loader">Loading Cinematic Experience...</div>
    <div id="webgl-container"></div>
    <div id="vignette"></div>

    <div id="ui-layer">
        <div class="header" id="instructions">Drag a tile to magnetize connections</div>
        <div id="tutorial-hand">
            <svg width="50" height="50" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M9.5 9.5V5.5C9.5 4.67 10.17 4 11 4C11.83 4 12.5 4.67 12.5 5.5V9.5M12.5 9.5V6.5C12.5 5.67 13.17 5 14 5C14.83 5 15.5 5.67 15.5 6.5V9.5M15.5 9.5V7.5C15.5 6.67 16.17 6 17 6C17.83 6 18.5 6.67 18.5 7.5V14.5C18.5 17.54 16.04 20 13 20H11.5C8.9 20 6.5 17.6 6.5 15V11.5C6.5 10.67 7.17 10 8 10C8.83 10 9.5 10.67 9.5 11.5V9.5" stroke="#ffffff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" fill="rgba(0,0,0,0.3)"/>
            </svg>
        </div>
        <div id="fx-layer" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 5;"></div>
    </div>

    <!-- H4: Enhanced End Card -->
    <div id="end-card">
        <div class="close-btn" id="close-btn-cta">×</div>
        <div class="app-icon">WORD<br>ASSOCIATION<br>TILES</div>
        <div class="stars">★★★★★ 4.8</div>
        <div class="win-title">Brilliant!</div>
        <div class="teaser">500+ Word Puzzles Inside</div>
        <button class="cta-button" id="cta-button-cta">Play Free Now</button>
    </div>
</body>
</html>
